name: publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version/tag to publish (for example v0.2.0)
        required: true
        type: string
      release_type:
        description: Release channel
        required: true
        default: release
        type: choice
        options:
          - release
          - beta
          - alpha
      changelog:
        description: Changelog markdown
        required: true
        type: string
      dry_run:
        description: Build only (skip Modrinth/CurseForge publish)
        required: true
        default: false
        type: boolean
  release:
    types: [published]

permissions:
  contents: read

jobs:
  discover-modules:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: discover publish modules under builds/
        id: discover
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          props = {}
          for line in Path('gradle.properties').read_text(encoding='utf-8').splitlines():
              line = line.strip()
              if not line or line.startswith('#') or '=' not in line:
                  continue
              k, v = line.split('=', 1)
              props[k.strip()] = v.strip()

          entries = []
          builds = Path('builds')
          if builds.exists():
              for d in sorted(builds.iterdir()):
                  if not (d.is_dir() and d.name.startswith('mc') and (d / 'build.gradle').exists()):
                      continue

                  suffix = d.name.removeprefix('mc')
                  mc_version = props.get(f'minecraft_version_{suffix}')
                  if not mc_version:
                      continue

                  entries.append({
                      'module': d.name,
                      'module_path': str(d).replace('\\\\', '/'),
                      'minecraft_version': mc_version,
                  })

          print('matrix=' + json.dumps(entries))
          PY

  publish:
    runs-on: ubuntu-24.04
    needs: discover-modules
    if: ${{ needs.discover-modules.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover-modules.outputs.matrix) }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: resolve publish metadata
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            RELEASE_TYPE="release"
            DRY_RUN="false"
            CHANGELOG="${{ github.event.release.body }}"
          else
            VERSION="${{ inputs.version }}"
            RELEASE_TYPE="${{ inputs.release_type }}"
            DRY_RUN="${{ inputs.dry_run }}"
            CHANGELOG="${{ inputs.changelog }}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          {
            echo 'changelog<<EOF'
            printf '%s\n' "$CHANGELOG"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: build ${{ matrix.module }}
        run: ./gradlew --no-configuration-cache -p ${{ matrix.module_path }} build

      - name: locate release jar for ${{ matrix.module }}
        id: jar
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path
          import sys

          module_path = Path('${{ matrix.module_path }}')
          libs = module_path / 'build' / 'libs'
          jars = sorted(
              p for p in libs.glob('*.jar')
              if '-sources' not in p.name and '-dev' not in p.name and '-javadoc' not in p.name
          )
          if not jars:
              print(f'No publishable jar found in {libs}', file=sys.stderr)
              sys.exit(1)

          chosen = jars[-1]
          print(f'path={chosen.as_posix()}')
          PY

      - name: upload built artifact for ${{ matrix.module }}
        uses: actions/upload-artifact@v7
        with:
          name: publish-${{ matrix.module }}
          path: ${{ steps.jar.outputs.path }}

      - name: publish ${{ matrix.module }} to Modrinth + CurseForge
        if: ${{ steps.meta.outputs.dry_run != 'true' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: ${{ steps.jar.outputs.path }}
          name: Darude ${{ steps.meta.outputs.version }} (${{ matrix.module }})
          version: ${{ steps.meta.outputs.version }}-${{ matrix.module }}
          version-type: ${{ steps.meta.outputs.release_type }}
          changelog: ${{ steps.meta.outputs.changelog }}
          game-versions: ${{ matrix.minecraft_version }}
          loaders: fabric
