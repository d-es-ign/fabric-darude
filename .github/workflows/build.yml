# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  discover-modules:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: discover build modules under builds/
        id: discover
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          entries = []
          builds = Path("builds")
          if builds.exists():
              for d in sorted(builds.iterdir()):
                  if d.is_dir() and d.name.startswith("mc") and (d / "build.gradle").exists():
                      entries.append({"module": d.name, "module_path": str(d).replace('\\\\', '/')})

          print("matrix=" + json.dumps(entries))
          PY

  common:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v5
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: validate version band registration
        run: ./scripts/validate-version-band-registration.sh
      - name: run common checks and harness
        run: ./gradlew --no-configuration-cache -p common check
      - name: run shared-mc verification
        run: ./gradlew --no-configuration-cache -p shared-mc-121- check && ./gradlew --no-configuration-cache -p shared-mc-261+ check

  build-versions:
    runs-on: ubuntu-24.04
    needs: [common, discover-modules]
    if: ${{ needs.discover-modules.outputs.matrix != '[]' }}
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover-modules.outputs.matrix) }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v5
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: validate ${{ matrix.module }} resource and compile pipeline
        run: ./gradlew --no-configuration-cache -p ${{ matrix.module_path }} processResources compileJava
      - name: run ${{ matrix.module }} datagen (if configured)
        run: |
          if ./gradlew --no-configuration-cache -p ${{ matrix.module_path }} help --task runDatagen >/dev/null 2>&1; then
            ./gradlew --no-configuration-cache -p ${{ matrix.module_path }} runDatagen
          else
            printf 'runDatagen task is not configured for %s; skipping.\n' "${{ matrix.module }}"
          fi
      - name: build ${{ matrix.module }}
        run: ./gradlew --no-configuration-cache -p ${{ matrix.module_path }} build
      - name: capture ${{ matrix.module }} artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: Artifacts-${{ matrix.module }}
          path: ${{ matrix.module_path }}/build/libs/

  release-jars:
    runs-on: ubuntu-24.04
    needs: [common, discover-modules]
    if: ${{ needs.discover-modules.outputs.matrix != '[]' }}
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover-modules.outputs.matrix) }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v5
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build ${{ matrix.module }}
        run: ./gradlew --no-configuration-cache -p ${{ matrix.module_path }} build
      - name: locate release jar for ${{ matrix.module }}
        id: jar
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path
          import sys

          module_path = Path('${{ matrix.module_path }}')
          libs = module_path / 'build' / 'libs'
          jars = sorted(
              p for p in libs.glob('*.jar')
              if '-sources' not in p.name and '-dev' not in p.name and '-javadoc' not in p.name
          )
          if not jars:
              print(f'No publishable jar found in {libs}', file=sys.stderr)
              sys.exit(1)

          chosen = jars[-1]
          print(f'path={chosen.as_posix()}')
          PY
      - name: upload release jar for ${{ matrix.module }}
        uses: actions/upload-artifact@v7
        with:
          name: release-jars-${{ matrix.module }}
          path: ${{ steps.jar.outputs.path }}
