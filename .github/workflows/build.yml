# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  common:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v5
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: validate version band registration
        run: ./scripts/validate-version-band-registration.sh
      - name: run common checks and harness
        run: ./gradlew --no-configuration-cache -p common check
      - name: run shared-mc verification
        run: ./gradlew --no-configuration-cache -p shared-mc check

  build-versions:
    runs-on: ubuntu-24.04
    needs: common
    strategy:
      fail-fast: false
      matrix:
        module: [mc121, mc261]
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v5
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build ${{ matrix.module }}
        run: ./gradlew --no-configuration-cache -p ${{ matrix.module }} build
      - name: capture ${{ matrix.module }} artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Artifacts-${{ matrix.module }}
          path: ${{ matrix.module }}/build/libs/
